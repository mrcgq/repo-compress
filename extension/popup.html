<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>repo-compress</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #1f2937;
    }

    .header {
      background: #2563eb;
      color: white;
      padding: 16px;
    }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header p  { font-size: 12px; opacity: 0.85; margin-top: 2px; }

    .body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }

    input[type="text"],
    input[type="password"],
    input[type="url"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #2563eb; }

    .hint {
      font-size: 11px;
      color: #6b7280;
      margin-top: 4px;
      line-height: 1.5;
    }
    .hint a { color: #2563eb; }

    .btn-save {
      width: 100%;
      padding: 9px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-save:hover { background: #1d4ed8; }

    .status {
      font-size: 12px;
      text-align: center;
      color: #10b981;
      min-height: 18px;
      font-weight: 500;
    }

    .footer {
      border-top: 1px solid #e5e7eb;
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer a { font-size: 12px; color: #2563eb; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    .divider {
      border: none;
      border-top: 1px solid #e5e7eb;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🗜️ repo-compress</h1>
    <p>GitHub → AI 友好格式</p>
  </div>

  <div class="body">

    <!-- Web UI 地址 -->
    <div>
      <label for="webUiUrl">Web UI 地址</label>
      <input
        type="url"
        id="webUiUrl"
        placeholder="https://mrcgq.github.io/repo-compress/"
      />
      <p class="hint">转换界面的网址，本地开发可用 http://localhost:5173</p>
    </div>

    <hr class="divider">

    <!-- GitHub Token -->
    <div>
      <label for="githubToken">GitHub Token（可选）</label>
      <input
        type="password"
        id="githubToken"
        placeholder="ghp_xxxxxxxxxxxx"
        autocomplete="off"
      />
      <p class="hint">
        避免 API 限流（60次/小时）。
        <a href="https://github.com/settings/tokens/new?scopes=public_repo&description=repo-compress"
           target="_blank">生成 Token →</a>
      </p>
    </div>

    <button class="btn-save" id="saveBtn">保存设置</button>
    <div class="status" id="status"></div>

  </div>

  <div class="footer">
    <a href="https://github.com/yourusername/repo-compress" target="_blank">GitHub</a>
    <a href="https://yourusername.github.io/repo-compress/" target="_blank">打开 Web UI</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
